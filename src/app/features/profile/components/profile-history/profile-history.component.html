<app-section-panel *ngIf="historyItems().length > 0" title="Historico Recente">
  <div class="history-timeline">
    <div class="history-item" *ngFor="let item of historyItems()" [style.--item-color]="getTypeColor(item.type)">
      <div class="timeline-dot"></div>

      <div class="history-card">
        <div class="card-header">
          <div class="icon-badge">{{ item.icon }}</div>
          <div class="header-info">
            <h3 class="item-title">{{ item.title }}</h3>
            <p class="item-description">{{ item.description }}</p>
          </div>
          <span class="item-date">{{ formatDate(item.date) }}</span>
        </div>
        <div class="card-footer" *ngIf="item.details">
          <span class="item-detail">{{ item.details }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="see-more">
    <button class="see-more-btn">Ver historico completo →</button>
  </div>
</app-section-panel>

<app-section-panel *ngIf="historyItems().length === 0" title="Historico Recente">
  <p class="empty-state-text">Nenhum historico disponivel. Comece a jogar!</p>
</app-section-panel>
