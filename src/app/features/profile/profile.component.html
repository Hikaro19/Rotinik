<div class="profile-container">
  <section class="profile-header">
    <div class="header-content">
      <div class="avatar-section">
        <div class="avatar">
          <span class="avatar-icon">👤</span>
        </div>
        <div class="info">
          <h1 class="username">Jogador #{{ playerSignal().level }}</h1>
          <p class="member-since">Membro desde {{ formatDate(memberSince()) }}</p>
        </div>
      </div>

      <div class="level-progress">
        <div class="level-badge">
          <span class="level-number">{{ playerSignal().level }}</span>
        </div>
        <div class="xp-section">
          <div class="xp-info">
            <span class="xp-current">{{ playerSignal().currentXP }}/{{ xpToNextLevel() }}</span>
            <span class="xp-label">XP</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="xpProgress()"></div>
          </div>
          <p class="xp-to-next">{{ xpToNextLevel() }} XP para o proximo nivel</p>
        </div>
      </div>
    </div>
  </section>

  <app-profile-stats></app-profile-stats>

  <app-section-panel title="Atividade do Ultimo Mes" [badge]="activitySummary()">
    <app-profile-activity-heatmap></app-profile-activity-heatmap>
  </app-section-panel>

  <app-section-panel title="Achievements" [badge]="achievementSummary()">
    <app-profile-achievements></app-profile-achievements>
  </app-section-panel>

  <app-profile-history></app-profile-history>
</div>
