<div class="home-container">
  <div class="welcome-card">
    <div class="welcome-content">
      <h2 class="welcome-title">Ola, {{ nomeUsuario() }}!</h2>
      <p class="welcome-subtitle">Nivel {{ nivelUsuario() }} • {{ moedas() }} moedas</p>
    </div>

    <div class="progress-circle">
      <svg class="progress-svg" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" class="progress-bg"></circle>
        <circle cx="60" cy="60" r="50" class="progress-fill" [style.stroke-dashoffset]="314 - (314 * progressoNivel()) / 100"></circle>
      </svg>
      <div class="progress-text">{{ progressoNivel() }}%</div>
    </div>
  </div>

  <div class="tab-container">
    <button class="tab-btn" [ngClass]="{ active: activeTab() === 'tarefas' }" (click)="switchTab('tarefas')">
      Tarefas
    </button>
    <button class="tab-btn" [ngClass]="{ active: activeTab() === 'rotinas' }" (click)="switchTab('rotinas')">
      Rotinas
    </button>
  </div>

  <div class="in-progress-section">
    <h3 class="section-title">Em Andamento</h3>

    <div class="routine-cards" *ngIf="activeTab() === 'rotinas'">
      <app-routine-card
        *ngFor="let rotina of rotinasEmAndamento()"
        [routine]="rotina"
        [showActions]="false"
        (click)="goToRoutineDetail(rotina.id)"
      ></app-routine-card>

      <div *ngIf="rotinasEmAndamento().length === 0" class="empty-state">
        <p>Nenhuma rotina em andamento. Crie uma para comecar!</p>
      </div>
    </div>

    <div class="routine-cards" *ngIf="activeTab() === 'tarefas'">
      <p class="empty-state" *ngIf="true">
        Tarefas isoladas podem ser acessadas dentro de cada rotina.
      </p>
    </div>
  </div>
</div>
