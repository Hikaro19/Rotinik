<section class="register-screen" aria-labelledby="register-title">
  <div class="register-shell">
    <header class="register-header">
      <button
        type="button"
        class="register-back"
        aria-label="Voltar para login"
        (click)="goBack()"
      >
        &lt;
      </button>

      <div class="register-copy">
        <h1 id="register-title" class="register-title">Crie uma conta</h1>
        <p class="register-subtitle">
          Preencha suas informações abaixo ou registre-se com sua rede social
        </p>
      </div>
    </header>

    <form class="register-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <app-input
        label="Nome Completo"
        placeholder="Digite seu nome completo"
        inputType="text"
        formControlName="fullName"
        [errors]="getFieldErrors('fullName') || undefined"
        [disabled]="isLoading()"
        [required]="true"
      ></app-input>

      <app-input
        label="Email"
        placeholder="Digite seu email"
        inputType="email"
        formControlName="email"
        [errors]="getFieldErrors('email') || undefined"
        [disabled]="isLoading()"
        [required]="true"
      ></app-input>

      <app-input
        label="Número de Telefone"
        placeholder="(27) 99999-9999"
        inputType="tel"
        formControlName="phone"
        [errors]="getFieldErrors('phone') || undefined"
        [disabled]="isLoading()"
        [required]="true"
      ></app-input>

      <app-input
        label="Senha"
        placeholder="Digite sua senha"
        inputType="password"
        formControlName="password"
        [errors]="getFieldErrors('password') || undefined"
        [disabled]="isLoading()"
        [required]="true"
      ></app-input>

      <app-button
        variant="primary"
        size="lg"
        [fullWidth]="true"
        [loading]="isLoading()"
        [disabled]="registerForm.invalid"
        ariaLabel="Registrar conta"
        (buttonClick)="onSubmit()"
      >
        REGISTRAR
      </app-button>
    </form>

    <section class="register-alt" aria-label="Outras formas de cadastro">
      <div class="register-divider">
        <span>ou</span>
      </div>

      <div class="auth-social">
      <button class="social-button" [disabled]="isLoading()">
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Google
      </button>
    </div>
    </section>
  </div>
</section>
