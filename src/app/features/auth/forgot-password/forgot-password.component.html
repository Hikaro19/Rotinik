<div class="forgot-password-page">
  <main class="forgot-password-shell">
    <a routerLink="/auth/login" class="back-link" aria-label="Voltar para o login">
      <span class="back-link__icon"><</span>
      <span class="back-link__text">Voltar</span>
    </a>

    <header class="forgot-password-header">
      <h1 class="forgot-password-title">Recuperar Acesso</h1>
      <p class="forgot-password-subtitle">
        Informe o e-mail cadastrado e enviaremos um link seguro para voce redefinir sua senha.
      </p>
    </header>

    <form
      *ngIf="!isSubmitted(); else successState"
      class="forgot-password-form"
      [formGroup]="forgotPasswordForm"
      (ngSubmit)="onSubmit()"
    >
      <label class="field-shell" for="forgot-email">
        <span class="field-label">E-mail</span>
        <input
          id="forgot-email"
          class="field-control"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
          [disabled]="isLoading()"
        />
      </label>

      <p class="field-hint" *ngIf="!getFieldErrors('email')">
        Use o mesmo e-mail que voce usa para entrar no Rotinik.
      </p>

      <p class="field-error" *ngIf="getFieldErrors('email') as error" role="alert">
        {{ error }}
      </p>

      <div *ngIf="formErrorMessage() as error" class="auth-error-alert" role="alert">
        {{ error }}
      </div>

      <button
        type="submit"
        class="submit-button"
        [class.btn-ready]="isButtonReady()"
        [disabled]="isLoading()"
      >
        {{ isLoading() ? 'ENVIANDO...' : 'ENVIAR LINK' }}
      </button>
    </form>

    <ng-template #successState>
      <section class="success-state" aria-live="polite">
        <div class="success-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </div>
        <h2 class="success-title">Link enviado com sucesso!</h2>
        <p class="success-message">Verifique sua caixa de entrada para redefinir sua senha.</p>
      </section>
    </ng-template>
  </main>

  <div class="auth-background-decoration auth-background-decoration--top"></div>
  <div class="auth-background-decoration auth-background-decoration--bottom"></div>
</div>
