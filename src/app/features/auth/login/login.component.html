    <div class="auth-container">
      <div class="auth-content">
        <div class="auth-header">
          <h1 class="auth-title">Bem-vindo ao Rotinik</h1>
          <p class="auth-subtitle">
            Gamifique suas rotinas e transforme hábitos em diversão
          </p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
          <app-input
            label="Email"
            placeholder="seu@email.com"
            inputType="email"
            [disabled]="isLoading()"
            formControlName="email"
            [errors]="getFieldErrors('email') || undefined"
            helpText="Use seu email para acessar"
            [required]="true"
          ></app-input>

          <app-input
            label="Senha"
            placeholder="Digite sua senha"
            inputType="password"
            [disabled]="isLoading()"
            formControlName="password"
            [errors]="getFieldErrors('password') || undefined"
            [required]="true"
          ></app-input>

          <div class="auth-form-footer">
            <label class="remember-me">
              <input type="checkbox" formControlName="rememberMe" />
              <span>Lembrar de mim</span>
            </label>
            <a routerLink="/auth/forgot-password" class="forgot-password-link">Esqueceu a senha?</a>
          </div>

          <div *ngIf="formErrorMessage()" class="auth-error-alert" role="alert">
            {{ formErrorMessage() }}
          </div>

          <app-button
            class="login-submit"
            [class.btn-ready]="loginForm.valid"
            variant="primary"
            size="lg"
            [fullWidth]="true"
            [loading]="isLoading()"
            ariaLabel="Entrar na conta"
            (buttonClick)="onSubmit()"
          >
            {{ isLoading() ? 'Entrando...' : 'Entrar' }}
          </app-button>
        </form>

        <div class="auth-divider">
          <span>ou</span>
        </div>

        <div class="auth-social">
          <button class="social-button" [disabled]="isLoading()">
            <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.834 8.207 11.614.6.111.82-.261.82-.577 0-.285-.011-1.04-.017-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.333-1.755-1.333-1.755-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.604-.015 2.896-.015 3.286 0 .319.216.694.824.576 4.765-1.777 8.203-6.307 8.203-11.613 0-6.627-5.373-12-12-12z" />
            </svg>
            GitHub
          </button>

          <button class="social-button" [disabled]="isLoading()">
            <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Google
          </button>
        </div>

        <p class="auth-footer-text">
          Não tem conta?
          <a routerLink="/auth/register" class="auth-link">Crie uma conta agora</a>
        </p>
      </div>

      <div class="auth-background-decoration"></div>
    </div>
